# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:

  # Common hooks
  - id: trailing-whitespace
    exclude: ^vendor/
  - id: check-added-large-files
  - id: check-merge-conflict

  # This regex ("entry") must not be in our codebase.
  - id: debug-statements
    language: pygrep
    entry: debug\.Stack
    types: [go]
    exclude: ^vendor/

- repo: https://github.com/gitleaks/gitleaks
  rev: v8.24.0
  hooks:
    - id: gitleaks

- repo: local
  hooks:
  - id: go-test
    name: Go tests
    language: system
    entry: go test ./...
    pass_filenames: false
    always_run: true

  - id: go-lint
    name: Go lint
    language: system
    entry: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run
    pass_filenames: false
    always_run: true

  - id: update-readme-usage
    name: Update README usage block
    language: script
    entry: scripts/update-readme.sh
    pass_filenames: false
    always_run: true
