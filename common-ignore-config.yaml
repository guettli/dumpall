removeFields:
  # Server-managed metadata and status.
  - fields:
      - metadata.creationTimestamp
      - metadata.generation
      - metadata.managedFields
      - metadata.ownerReferences
      - metadata.resourceVersion
      - metadata.uid
      - metadata.annotations.deployment\.kubernetes\.io/revision
      - metadata.annotations.clusterctl\.cluster\.x-k8s\.io
      - metadata.annotations.kubectl\.kubernetes\.io/last-applied-configuration
      - metadata.labels.argocd\.argoproj\.io/instance
      - status
      # Helm charts often render labels/annotations as explicit null when the
      # chart has no values for them. The API server never returns null here.
      - path: metadata.labels
        value: null
      - path: metadata.annotations
        value: null
  # Namespace-specific noise added by the API server.
  - kind: Namespace
    fields:
      - metadata.labels.kubernetes\.io/metadata\.name
      - spec.finalizers
  # Webhook defaults and injected CA bundles.
  - group: admissionregistration.k8s.io
    kind: "*WebhookConfiguration"
    fields:
      - webhooks.clientConfig.caBundle
      - webhooks.clientConfig.service.port
      - webhooks.matchPolicy
      - webhooks.namespaceSelector
      - webhooks.objectSelector
      - webhooks.reinvocationPolicy
      - webhooks.rules.scope
      - webhooks.timeoutSeconds
  # CRD conversion webhook defaults and None-strategy cleanup.
  - group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    fields:
      - spec.conversion.webhook.clientConfig.caBundle
      - spec.conversion.webhook.clientConfig.service.port
      # CRDs without webhook conversion have spec.conversion: {strategy: None}.
      # Removing strategy (only when None) leaves an empty map, then removes it.
      # CRDs with webhook conversion keep strategy: Webhook and all webhook fields.
      - path: spec.conversion.strategy
        value: None
      - path: spec.conversion
        value: {}

  # ── Service ───────────────────────────────────────────────────────────────────
  - kind: Service
    fields:
      # Assigned by the API server from the cluster's service CIDR at creation
      # time. Never written in source YAML. Changes on every new Service object.
      - spec.clusterIP
      - spec.clusterIPs

      # Derived from the cluster's primary IP family; varies between IPv4-only,
      # IPv6-only, and dual-stack clusters. Never written in source YAML.
      - spec.ipFamilies

      # Default: SingleStack. The API server writes it when the field is omitted.
      # PreferDualStack and RequireDualStack are explicit user choices and are
      # retained by the value constraint.
      - path: spec.ipFamilyPolicy
        value: SingleStack

      # Default: Cluster. API server writes it even when the field is omitted.
      - path: spec.internalTrafficPolicy
        value: Cluster

      # Default: None. Only alternative is ClientIP, which would be explicit.
      - path: spec.sessionAffinity
        value: None

      # Default protocol for Service ports. UDP/SCTP would be explicit.
      - path: spec.ports.protocol
        value: TCP

      # Default Service type. NodePort/LoadBalancer/ExternalName would be explicit.
      - path: spec.type
        value: ClusterIP

  # ── Deployment ────────────────────────────────────────────────────────────────
  - group: apps
    kind: Deployment
    fields:
      # Default: 600.
      - path: spec.progressDeadlineSeconds
        value: 600

      # Default: 10.
      - path: spec.revisionHistoryLimit
        value: 10

      # Default RollingUpdate strategy. Fields are removed leaf-to-root so that
      # each parent map becomes empty and matches its {} constraint in sequence.
      # Recreate strategy and non-default maxSurge/maxUnavailable are preserved.
      - path: spec.strategy.rollingUpdate.maxSurge
        value: 25%
      - path: spec.strategy.rollingUpdate.maxUnavailable
        value: 25%
      - path: spec.strategy.rollingUpdate
        value: {}
      - path: spec.strategy.type
        value: RollingUpdate
      - path: spec.strategy
        value: {}

      # Always null in the API response for pod templates.
      - spec.template.metadata.creationTimestamp

      # Default: Always. The only valid value for Deployment pod templates.
      - path: spec.template.spec.restartPolicy
        value: Always

      # Default: default-scheduler.
      - path: spec.template.spec.schedulerName
        value: default-scheduler

      # Default: ClusterFirst.
      - path: spec.template.spec.dnsPolicy
        value: ClusterFirst

      # Default: 30 seconds.
      - path: spec.template.spec.terminationGracePeriodSeconds
        value: 30

      # Deprecated alias for serviceAccountName. Copied automatically by the API server.
      - spec.template.spec.serviceAccount

      # Default: /dev/termination-log.
      - path: spec.template.spec.containers.terminationMessagePath
        value: /dev/termination-log
      - path: spec.template.spec.initContainers.terminationMessagePath
        value: /dev/termination-log

      # Default: File.
      - path: spec.template.spec.containers.terminationMessagePolicy
        value: File
      - path: spec.template.spec.initContainers.terminationMessagePolicy
        value: File

      # API server always sets apiVersion: v1 on fieldRef. It is the only valid value.
      - path: spec.template.spec.containers.env.valueFrom.fieldRef.apiVersion
        value: v1

      # Default protocol for container port declarations. UDP/SCTP would be explicit.
      - path: spec.template.spec.containers.ports.protocol
        value: TCP

      # Probe defaults (failureThreshold: 3, successThreshold: 1, timeoutSeconds: 1,
      # httpGet.scheme: HTTP, tcpSocket.protocol: TCP).
      - path: spec.template.spec.containers.livenessProbe.failureThreshold
        value: 3
      - path: spec.template.spec.containers.livenessProbe.successThreshold
        value: 1
      - path: spec.template.spec.containers.livenessProbe.timeoutSeconds
        value: 1
      - path: spec.template.spec.containers.livenessProbe.httpGet.scheme
        value: HTTP
      - path: spec.template.spec.containers.livenessProbe.tcpSocket.protocol
        value: TCP
      - path: spec.template.spec.containers.readinessProbe.failureThreshold
        value: 3
      - path: spec.template.spec.containers.readinessProbe.successThreshold
        value: 1
      - path: spec.template.spec.containers.readinessProbe.timeoutSeconds
        value: 1
      - path: spec.template.spec.containers.readinessProbe.httpGet.scheme
        value: HTTP
      - path: spec.template.spec.containers.readinessProbe.tcpSocket.protocol
        value: TCP
      - path: spec.template.spec.containers.startupProbe.failureThreshold
        value: 3
      - path: spec.template.spec.containers.startupProbe.successThreshold
        value: 1
      - path: spec.template.spec.containers.startupProbe.timeoutSeconds
        value: 1
      - path: spec.template.spec.containers.startupProbe.httpGet.scheme
        value: HTTP
      - path: spec.template.spec.containers.startupProbe.tcpSocket.protocol
        value: TCP

      # Default file-permission mode: 0644 (decimal 420).
      - path: spec.template.spec.volumes.configMap.defaultMode
        value: 420
      - path: spec.template.spec.volumes.projected.defaultMode
        value: 420
      - path: spec.template.spec.volumes.secret.defaultMode
        value: 420

      # Empty pod-level security context. Real settings (runAsGroup, fsGroup, …)
      # produce a non-empty map and are preserved by the value constraint.
      - path: spec.template.spec.securityContext
        value: {}

      # Empty container resources means no requests/limits are set.
      - path: spec.template.spec.containers.resources
        value: {}

      # Empty nodeSelector/tolerations are equivalent to absent.
      - path: spec.template.spec.nodeSelector
        value: {}
      - path: spec.template.spec.tolerations
        value: []

  # ── StatefulSet ───────────────────────────────────────────────────────────────
  - group: apps
    kind: StatefulSet
    fields:
      # Default: OrderedReady.
      - path: spec.podManagementPolicy
        value: OrderedReady

      # Default: 10.
      - path: spec.revisionHistoryLimit
        value: 10

      # Default RollingUpdate update strategy (leaf-to-root). OnDelete and
      # non-zero partition values are preserved by the value constraints.
      - path: spec.updateStrategy.rollingUpdate.partition
        value: 0
      - path: spec.updateStrategy.rollingUpdate
        value: {}
      - path: spec.updateStrategy.type
        value: RollingUpdate
      - path: spec.updateStrategy
        value: {}

      # Default PVC retention policy (Retain/Retain). Delete policies preserved.
      - path: spec.persistentVolumeClaimRetentionPolicy.whenDeleted
        value: Retain
      - path: spec.persistentVolumeClaimRetentionPolicy.whenScaled
        value: Retain
      - path: spec.persistentVolumeClaimRetentionPolicy
        value: {}

      # Same pod-template defaults as Deployment — see comments above.
      - spec.template.metadata.creationTimestamp
      - path: spec.template.spec.restartPolicy
        value: Always
      - path: spec.template.spec.schedulerName
        value: default-scheduler
      - path: spec.template.spec.dnsPolicy
        value: ClusterFirst
      - path: spec.template.spec.terminationGracePeriodSeconds
        value: 30
      - spec.template.spec.serviceAccount
      - path: spec.template.spec.containers.terminationMessagePath
        value: /dev/termination-log
      - path: spec.template.spec.initContainers.terminationMessagePath
        value: /dev/termination-log
      - path: spec.template.spec.containers.terminationMessagePolicy
        value: File
      - path: spec.template.spec.initContainers.terminationMessagePolicy
        value: File
      - path: spec.template.spec.containers.env.valueFrom.fieldRef.apiVersion
        value: v1
      - path: spec.template.spec.containers.ports.protocol
        value: TCP
      - path: spec.template.spec.containers.livenessProbe.failureThreshold
        value: 3
      - path: spec.template.spec.containers.livenessProbe.successThreshold
        value: 1
      - path: spec.template.spec.containers.livenessProbe.timeoutSeconds
        value: 1
      - path: spec.template.spec.containers.livenessProbe.httpGet.scheme
        value: HTTP
      - path: spec.template.spec.containers.livenessProbe.tcpSocket.protocol
        value: TCP
      - path: spec.template.spec.containers.readinessProbe.failureThreshold
        value: 3
      - path: spec.template.spec.containers.readinessProbe.successThreshold
        value: 1
      - path: spec.template.spec.containers.readinessProbe.timeoutSeconds
        value: 1
      - path: spec.template.spec.containers.readinessProbe.httpGet.scheme
        value: HTTP
      - path: spec.template.spec.containers.readinessProbe.tcpSocket.protocol
        value: TCP
      - path: spec.template.spec.containers.startupProbe.failureThreshold
        value: 3
      - path: spec.template.spec.containers.startupProbe.successThreshold
        value: 1
      - path: spec.template.spec.containers.startupProbe.timeoutSeconds
        value: 1
      - path: spec.template.spec.containers.startupProbe.httpGet.scheme
        value: HTTP
      - path: spec.template.spec.containers.startupProbe.tcpSocket.protocol
        value: TCP
      - path: spec.template.spec.volumes.configMap.defaultMode
        value: 420
      - path: spec.template.spec.volumes.projected.defaultMode
        value: 420
      - path: spec.template.spec.volumes.secret.defaultMode
        value: 420
      - path: spec.template.spec.securityContext
        value: {}
      - path: spec.template.spec.containers.resources
        value: {}
      - path: spec.template.spec.nodeSelector
        value: {}
      - path: spec.template.spec.tolerations
        value: []

  # ── RoleBinding / ClusterRoleBinding ──────────────────────────────────────────
  - group: rbac.authorization.k8s.io
    kind: "*RoleBinding"
    fields:
      # The API server omits apiGroup: "" on ServiceAccount subjects (it is the
      # implicit default). Helm-rendered manifests often include it explicitly.
      - path: subjects.apiGroup
        value: ""
