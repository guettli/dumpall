rules:
  # Server-managed metadata and status.
  - fields:
      - metadata.creationTimestamp
      - metadata.generation
      - metadata.managedFields
      - metadata.ownerReferences
      - metadata.resourceVersion
      - metadata.uid
      - metadata.annotations.deployment\.kubernetes\.io/revision
      - metadata.annotations.clusterctl\.cluster\.x-k8s\.io
      - metadata.annotations.kubectl\.kubernetes\.io/last-applied-configuration
      - status
  # Namespace-specific noise added by the API server.
  - kind: Namespace
    fields:
      - metadata.labels.kubernetes\.io/metadata\.name
      - spec.finalizers
  # Webhook defaults and injected CA bundles.
  - group: admissionregistration.k8s.io
    kind: "*WebhookConfiguration"
    fields:
      - webhooks.clientConfig.caBundle
      - webhooks.clientConfig.service.port
      - webhooks.matchPolicy
      - webhooks.namespaceSelector
      - webhooks.objectSelector
      - webhooks.reinvocationPolicy
      - webhooks.rules.scope
      - webhooks.timeoutSeconds
  # CRD conversion webhook defaults.
  - group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    fields:
      - spec.conversion.webhook.clientConfig.caBundle
      - spec.conversion.webhook.clientConfig.service.port
